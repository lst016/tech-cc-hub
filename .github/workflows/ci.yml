name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 18.18.0
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install image-processing test dependencies
        run: python -m pip install --disable-pip-version-check --no-input Pillow numpy

      - name: Run tests
        run: npm test

      - name: Verify release metadata
        if: runner.os == 'Linux' && matrix.node == '22.x'
        run: npm run verify:release

      - name: Verify release package
        if: runner.os == 'Linux' && matrix.node == '22.x'
        run: node scripts/build-release.mjs --output-dir dist/release-ci

      - name: Smoke test installed release package
        if: runner.os == 'Linux' && matrix.node == '22.x'
        run: node scripts/verify-release-archive.mjs dist/release-ci/codex-canvas-v$(node -p "require('./package.json').version").tgz
