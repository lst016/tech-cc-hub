name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            command: npm run release:win-x64
            uploads_artifacts: true
          - os: macos-14
            platform: mac
            arch: arm64
            command: npm run release:mac-arm64
            uploads_artifacts: true
          - os: macos-15-intel
            platform: mac
            arch: x64
            command: npm run release:mac-x64
            uploads_artifacts: true

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require macOS signing credentials
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/qa/require-macos-signing-env.sh

      - name: Build desktop artifacts
        if: matrix.platform != 'mac'
        run: ${{ matrix.command }}

      - name: Build signed and notarized macOS artifacts
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.command }}

      - name: Smoke test packaged Windows startup
        if: matrix.platform == 'win'
        run: npm run qa:packaged

      - name: Verify signed and notarized macOS DMG
        if: matrix.platform == 'mac'
        run: npm run qa:macos-packaged -- ${{ matrix.arch }}

      - name: Prepare macOS updater metadata
        if: matrix.platform == 'mac'
        shell: bash
        env:
          MAC_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          arch = os.environ["MAC_ARCH"]
          dist = Path("dist")
          source = dist / "latest-mac.yml"
          target = dist / "latest-x64-mac.yml" if arch == "x64" else source
          if not source.is_file():
              raise SystemExit("dist/latest-mac.yml is missing")

          text = source.read_text(encoding="utf-8")
          match = re.search(r"^path:\s*['\"]?(.+?)['\"]?\s*$", text, re.M)
          if not match:
              raise SystemExit("latest-mac.yml does not declare path")

          artifact = match.group(1)
          artifact_path = dist / artifact
          if not artifact_path.is_file():
              raise SystemExit(f"latest-mac.yml points to missing artifact: {artifact}")

          arch_pattern = re.compile(rf"(?:^|[-_. ]){re.escape(arch)}(?:[-_. ]|$)", re.I)
          if not arch_pattern.search(artifact_path.name):
              if arch != "x64":
                  raise SystemExit(f"{source.name} points to an artifact without the macOS architecture marker: {artifact_path.name}")
              renamed = artifact_path.with_name(f"{artifact_path.stem}-{arch}{artifact_path.suffix}")
              if renamed.exists():
                  raise SystemExit(f"cannot rename {artifact_path.name}; target exists: {renamed.name}")
              blockmap_path = Path(f"{artifact_path}.blockmap")
              renamed_blockmap = Path(f"{renamed}.blockmap")
              if not blockmap_path.is_file():
                  raise SystemExit(f"missing updater blockmap before rename: {blockmap_path.name}")
              if renamed_blockmap.exists():
                  raise SystemExit(f"cannot rename {blockmap_path.name}; target exists: {renamed_blockmap.name}")
              artifact_path.rename(renamed)
              blockmap_path.rename(renamed_blockmap)
              text = text.replace(artifact_path.name, renamed.name)
              artifact_path = renamed

          wrong_arch = "x64" if arch == "arm64" else "arm64"
          wrong_pattern = re.compile(rf"(?:^|[-_. ]){wrong_arch}(?:[-_. ]|$)", re.I)
          if not arch_pattern.search(artifact_path.name) or wrong_pattern.search(artifact_path.name):
              raise SystemExit(f"{source.name} points to the wrong macOS architecture artifact: {artifact_path.name}")
          blockmap_path = Path(f"{artifact_path}.blockmap")
          if not blockmap_path.is_file():
              raise SystemExit(f"missing updater blockmap: {blockmap_path.name}")

          source.write_text(text, encoding="utf-8")
          if target != source and target.exists():
              raise SystemExit(f"target updater metadata already exists: {target}")
          if target != source:
              source.rename(target)
          print(f"Prepared {target} -> {artifact_path.name}")
          PY

      - name: Verify Windows updater artifacts
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $latestPath = Join-Path "dist" "latest.yml"
          if (-not (Test-Path -LiteralPath $latestPath)) {
            throw "dist/latest.yml is missing"
          }

          $latest = Get-Content -LiteralPath $latestPath
          $pathLine = $latest | Select-String -Pattern "^\s*path:\s*['""]?(.+?)['""]?\s*$" | Select-Object -First 1
          if (-not $pathLine) {
            throw "latest.yml does not declare installer path"
          }

          $installerName = $pathLine.Matches[0].Groups[1].Value.Trim()
          $installerPath = Join-Path "dist" $installerName
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "latest.yml points to missing installer: $installerName"
          }

          $blockmapPath = "$installerPath.blockmap"
          if (-not (Test-Path -LiteralPath $blockmapPath)) {
            throw "missing updater blockmap: $blockmapPath"
          }

          $sizeLine = $latest | Select-String -Pattern "^\s*size:\s*(\d+)\s*$" | Select-Object -First 1
          if ($sizeLine) {
            $declaredSize = [int64]$sizeLine.Matches[0].Groups[1].Value
            $actualSize = (Get-Item -LiteralPath $installerPath).Length
            if ($declaredSize -ne $actualSize) {
              throw "latest.yml size mismatch for $installerName. declared=$declaredSize actual=$actualSize"
            }
          }

      - name: Upload artifacts
        if: matrix.uploads_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
            dist/*.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Normalize GitHub asset names
        if: contains(needs.*.result, 'success') || true
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          release_dir = Path("release-assets")
          latest_path = release_dir / "latest.yml"
          if not latest_path.is_file():
              print("latest.yml not found (no Windows build artifacts), skipping normalization")
              raise SystemExit(0)

          text = latest_path.read_text(encoding="utf-8")
          match = re.search(r"^path:\s*['\"]?(.+?)['"']?\s*$", text, re.M)
          if not match:
              raise SystemExit("latest.yml does not declare path")

          installer = match.group(1)
          normalized = installer.replace(" ", ".")
          if normalized != installer:
              for suffix in ("", ".blockmap"):
                  source = release_dir / f"{installer}{suffix}"
                  target = release_dir / f"{normalized}{suffix}"
                  if not source.is_file():
                      raise SystemExit(f"missing updater asset: {source}")
                  source.rename(target)
              latest_path.write_text(text.replace(installer, normalized), encoding="utf-8")
          PY

      - name: List release assets
        run: |
          echo "Release assets:"
          ls -la release-assets/

      - name: Verify Windows updater assets
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          if [ ! -s latest.yml ]; then
            echo "latest.yml not found, skipping Windows updater verification"
            exit 0
          fi
          installer="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("latest.yml").read_text(encoding="utf-8")
          match = re.search(r"^path:\s*['\"]?(.+?)['\"]?\s*$", text, re.M)
          if match:
              print(match.group(1))
          PY
          )"
          if [ -z "$installer" ]; then
            echo "latest.yml does not declare path"
            exit 1
          fi
          test -s "$installer"
          test -s "${installer}.blockmap"

      - name: Verify macOS updater assets
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          python - <<'PY'
          import re
          from pathlib import Path

          release_dir = Path(".")
          seen_artifacts = set()
          for arch, metadata_name in (("arm64", "latest-mac.yml"), ("x64", "latest-x64-mac.yml")):
              metadata = release_dir / metadata_name
              if not metadata.is_file():
                  raise SystemExit(f"{metadata} is missing")

              text = metadata.read_text(encoding="utf-8")
              match = re.search(r"^path:\s*['\"]?(.+?)['\"]?\s*$", text, re.M)
              if not match:
                  raise SystemExit(f"{metadata} does not declare path")

              arch_pattern = re.compile(rf"(?:^|[-_. ]){re.escape(arch)}(?:[-_. ]|$)", re.I)
              wrong_arch = "x64" if arch == "arm64" else "arm64"
              wrong_pattern = re.compile(rf"(?:^|[-_. ]){wrong_arch}(?:[-_. ]|$)", re.I)
              refs = set(re.findall(r"^\s*(?:-\s*)?(?:url|path):\s*['\"]?(.+?)['\"]?\s*$", text, re.M))
              if match.group(1) not in refs:
                  raise SystemExit(f"{metadata} path is not represented in updater file refs")

              for artifact in refs:
                  artifact_path = release_dir / artifact
                  if not artifact_path.is_file():
                      raise SystemExit(f"{metadata} points to missing artifact: {artifact}")
                  if not arch_pattern.search(artifact_path.name) or wrong_pattern.search(artifact_path.name):
                      raise SystemExit(f"{metadata} points to the wrong macOS architecture artifact: {artifact_path.name}")
                  blockmap_path = Path(f"{artifact_path}.blockmap")
                  if not blockmap_path.is_file():
                      raise SystemExit(f"{metadata} points to missing blockmap: {blockmap_path.name}")

              artifact_name = match.group(1)
              if artifact_name in seen_artifacts:
                  raise SystemExit(f"macOS updater metadata files point to the same artifact: {artifact_name}")
              seen_artifacts.add(artifact_name)

              print(f"{metadata} -> {artifact_name}")
          PY

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS || true
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          body_path: doc/90-releases/${{ github.ref_name }}.md
          files: release-assets/*
          fail_on_unmatched_files: false
