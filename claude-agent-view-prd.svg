<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d7e0ea;stroke-width:2}.title{font:700 48px 'Microsoft YaHei', 'Noto Sans CJK SC', Arial;fill:#102033}.subtitle{font:400 24px 'Microsoft YaHei', Arial;fill:#516174}.h{font:700 28px 'Microsoft YaHei', Arial;fill:#102033}.t{font:400 22px 'Microsoft YaHei', Arial;fill:#26384d}.s{font:400 18px 'Microsoft YaHei', Arial;fill:#586a7e}.tag{font:700 18px 'Microsoft YaHei', Arial;fill:#fff}.mini{font:700 18px 'Microsoft YaHei', Arial;fill:#14324a}.arrow{stroke:#1d8f9f;stroke-width:5;fill:none;marker-end:url(#arrow)}.line{stroke:#d7e0ea;stroke-width:2}.accent{fill:#1d8f9f}.accent2{fill:#0b5f87}.warn{fill:#f59e0b}.ok{fill:#10b981}.bad{fill:#ef4444}.idle{fill:#64748b}.chip{fill:#e8f7fa;stroke:#9bd7df;stroke-width:1.5}.prio1{fill:#dff7ee;stroke:#7bd7ad}.prio2{fill:#e8f2ff;stroke:#9cc5ff}.prio3{fill:#fff3df;stroke:#f6c47a}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d8f9f"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect class="bg" width="1920" height="1080"/>

  <text x="80" y="85" class="title">PRD：tech-cc-hub Agent View 集成</text>
  <text x="82" y="125" class="subtitle">目标：把 Claude Code 的 claude agents 能力映射成可视化的后台会话管理台</text>
  <rect x="1540" y="54" rx="22" ry="22" width="300" height="52" class="accent2"/>
  <text x="1570" y="88" class="tag">MVP / Claude Code 2.1.139</text>

  <rect x="80" y="165" width="520" height="250" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="115" y="215" class="h">1. 用户痛点</text>
  <text x="120" y="265" class="t">• 多个 Claude 任务分散在不同终端</text>
  <text x="120" y="305" class="t">• 不知道哪个任务卡住、等输入、已完成</text>
  <text x="120" y="345" class="t">• 并行改代码时工作区/产物不透明</text>
  <text x="120" y="385" class="t">• 插件、MCP、Hook 状态缺少总览</text>

  <rect x="660" y="165" width="600" height="250" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="695" y="215" class="h">2. 产品目标</text>
  <text x="700" y="265" class="t">统一展示所有后台会话与子代理状态</text>
  <text x="700" y="305" class="t">支持 Peek 快速查看、Attach 深入接管</text>
  <text x="700" y="345" class="t">让阻塞、权限、工具调用、产物目录可见</text>
  <text x="700" y="385" class="t">减少“开很多终端但不知道谁在干嘛”</text>

  <rect x="1320" y="165" width="520" height="250" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="1355" y="215" class="h">3. 非目标</text>
  <text x="1360" y="265" class="t">• 不复刻 Claude CLI TUI</text>
  <text x="1360" y="305" class="t">• 不直接接管外部 claude daemon</text>
  <text x="1360" y="345" class="t">• 不绕过权限/审批/安全策略</text>
  <text x="1360" y="385" class="t">• 不把 subagent 当成独立 session</text>

  <rect x="80" y="465" width="1760" height="260" rx="28" class="panel" filter="url(#shadow)"/>
  <text x="115" y="515" class="h">4. 核心流程</text>
  <g transform="translate(130,565)">
    <rect x="0" y="0" width="210" height="86" rx="18" class="chip"/><text x="35" y="35" class="mini">Dispatch Task</text><text x="28" y="64" class="s">创建后台会话</text>
    <path d="M220 43 H315" class="arrow"/>
    <rect x="330" y="0" width="210" height="86" rx="18" class="chip"/><text x="370" y="35" class="mini">Working</text><text x="365" y="64" class="s">工具/代码执行</text>
    <path d="M550 43 H645" class="arrow"/>
    <rect x="660" y="0" width="210" height="86" rx="18" class="chip"/><text x="708" y="35" class="mini">Needs Input</text><text x="696" y="64" class="s">权限/问题/阻塞</text>
    <path d="M880 43 H975" class="arrow"/>
    <rect x="990" y="0" width="210" height="86" rx="18" class="chip"/><text x="1058" y="35" class="mini">Peek</text><text x="1030" y="64" class="s">快速预览回复</text>
    <path d="M1210 43 H1305" class="arrow"/>
    <rect x="1320" y="0" width="210" height="86" rx="18" class="chip"/><text x="1376" y="35" class="mini">Attach</text><text x="1355" y="64" class="s">进入完整会话</text>
    <path d="M770 93 C770 150 1030 150 1030 93" class="arrow"/>
    <rect x="660" y="145" width="210" height="70" rx="18" fill="#edfdf5" stroke="#7bd7ad"/><text x="704" y="188" class="mini">Completed</text>
    <rect x="990" y="145" width="210" height="70" rx="18" fill="#fff0f0" stroke="#f3a2a2"/><text x="1050" y="188" class="mini">Failed</text>
  </g>

  <rect x="80" y="770" width="560" height="235" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="115" y="820" class="h">5. 状态模型</text>
  <circle cx="125" cy="865" r="12" class="accent"/><text x="150" y="872" class="t">Working：正在执行</text>
  <circle cx="125" cy="905" r="12" class="warn"/><text x="150" y="912" class="t">Needs Input：等待用户</text>
  <circle cx="125" cy="945" r="12" class="idle"/><text x="150" y="952" class="t">Idle / Stopped：空闲或停止</text>
  <circle cx="380" cy="865" r="12" class="ok"/><text x="405" y="872" class="t">Completed：已完成</text>
  <circle cx="380" cy="905" r="12" class="bad"/><text x="405" y="912" class="t">Failed：失败</text>

  <rect x="700" y="770" width="560" height="235" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="735" y="820" class="h">6. 集成点</text>
  <text x="740" y="865" class="t">• Session Store：会话列表与生命周期</text>
  <text x="740" y="905" class="t">• Agent Progress Summary：进度摘要</text>
  <text x="740" y="945" class="t">• Tool Events：工具调用、权限、错误</text>
  <text x="740" y="985" class="t">• Plugin/MCP Details + CLAUDE_PROJECT_DIR</text>

  <rect x="1320" y="770" width="520" height="235" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="1355" y="820" class="h">7. MVP 优先级</text>
  <rect x="1360" y="850" width="420" height="38" rx="12" class="prio1"/><text x="1380" y="875" class="t">P0：列表、状态、Peek、Attach</text>
  <rect x="1360" y="900" width="420" height="38" rx="12" class="prio2"/><text x="1380" y="925" class="t">P1：Stop / Respawn / Worktree</text>
  <rect x="1360" y="950" width="420" height="38" rx="12" class="prio3"/><text x="1380" y="975" class="t">P2：插件成本、MCP 诊断、统计</text>

  <line x1="80" y1="1040" x2="1840" y2="1040" class="line"/>
  <text x="80" y="1065" class="s">验收：能看到所有活跃会话；能识别阻塞；能进入/回复；能定位工作目录、工具事件、插件/MCP 来源。</text>
</svg>
