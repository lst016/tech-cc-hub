name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z GitHub Release tag whose assets should be rebuilt
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-validation:
    name: Validate ${{ matrix.os }} / Node ${{ matrix.node }}
    needs:
      - release-please
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'push' &&
            needs.release-please.result == 'success' &&
            needs.release-please.outputs.release-created == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        )
      }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 18.18.0
          - 22.x
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag-name }}

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag-name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install image-processing test dependencies
        run: python -m pip install --disable-pip-version-check --no-input Pillow numpy

      - name: Verify release metadata
        run: npm run verify:release

      - name: Run tests
        run: npm test

  release-assets:
    name: Build and upload release assets
    needs:
      - release-please
      - release-validation
    if: >-
      ${{
        always() &&
        needs.release-validation.result == 'success' &&
        (
          (github.event_name == 'push' &&
            needs.release-please.result == 'success' &&
            needs.release-please.outputs.release-created == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag-name }}
      RELEASE_VERSION: ${{ github.event_name == 'push' && needs.release-please.outputs.version || '' }}
      RELEASE_COMMIT: ${{ github.event_name == 'push' && needs.release-please.outputs.sha || '' }}

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag-name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: npm run verify:release

      - name: Build universal release package
        run: node scripts/build-release.mjs --output-dir dist/release

      - name: Smoke test installed release package
        run: node scripts/verify-release-archive.mjs "dist/release/codex-canvas-$RELEASE_TAG.tgz"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "$RELEASE_TAG"
          "dist/release/codex-canvas-${RELEASE_TAG}.tgz"
          dist/release/release-manifest.json
          dist/release/SHA256SUMS
          --clobber
